<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Carnet Gourmand - Blog cuisine</title>
    <link rel="stylesheet" href="style.css"
</head>
<body>
    <header>
        <div class="logo">
            <span class="logo-emoji">😊</span>
            <h1>Le Carnet Gourmand</h1>
        </div>
        <p class="tagline">Recettes et partages gourmands</p>
    </header>

    <main>
        <article class="recipe">
            <h2>Tarte aux pommes maison</h2>
            <p>Une delicieuse recette de tarte aux pommes croustillante et fondante...</p>
        </article>

        <section class="comments-section">
            <h3>Commentaires <span class="comment-count">(0)</span></h3>
            
            <!-- Zone d'affichage des commentaires -->
            <div id="comments-list" class="comments-list">
                <p class="no-comments">Soyez le premier a laisser un commentaire !</p>
            </div>

            <!-- Formulaire d'ajout de commentaire -->
            <div class="comment-form-container">
                <h4>Laisser un commentaire</h4>
                <form id="comment-form">
                    <div class="form-group">
                        <label for="name">Nom :</label>
                        <input type="text" id="name" name="name" placeholder="Votre nom">
                        <div class="error-message" id="name-error"></div>
                    </div>

                    <div class="form-group">
                        <label for="comment">Commentaire :</label>
                        <textarea id="comment" name="comment" rows="4" placeholder="Votre commentaire..."></textarea>
                        <div class="error-message" id="comment-error"></div>
                    </div>

                    <button type="submit" id="publish-btn" class="btn-publish">Publier</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Le Carnet Gourmand - Tous droits reserves</p>
    </footer>

    <script src="assets/js/script.js"></script>
</body>
</html>
